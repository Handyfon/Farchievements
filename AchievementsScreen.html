	<script id="AchievementScript" onclick="loadAchievements()">
	
	//ONLOAD SCRIPT
		//RESET TERM EACH TIME ITS OPENED
		game.settings.set('farchievements', 'lastSearchTerm', "");

		document.getElementById('CustomAchievmentBackgroundStyling').innerHTML = '<style>.achievementsscreen-window .window-content{background: #262626;}</style>';
		document.getElementById('toLoadNumber').value = game.settings.get('farchievements', 'loadPerPage');
		globalThis.FARCH_CARD_STYLES = new Set(["gold", "silver", "bronze", "green", "red", "purple", "holographic"]);
		globalThis.FARCH_CARD_STYLE_ALIASES = {
			ornate: "gold",
			cursed: "red",
			frostglass: "silver",
			verdant: "green",
			royal: "purple",
			obsidian: "purple",
			prismatic: "holographic"
		};
		function normalizeAchievementCardStyle(style) {
			return globalThis.FARCH_CARD_STYLE_ALIASES[style] ?? style;
		}
		function getAchievementCardStyleClass(achievement) {
			const style = normalizeAchievementCardStyle(achievement?.cardStyle);
			return globalThis.FARCH_CARD_STYLES.has(style) ? `achievement-card-${style}` : "";
		}
		function setHolographicHoverVars(card, relativeX, relativeY) {
			if (!card.classList.contains('achievement-card-holographic')) return;
			const centerDistance = Math.min(1, Math.hypot(relativeX - 0.5, relativeY - 0.5) * 1.9);
			const diagonal = Math.max(0, Math.min(1, (relativeX * 0.65) + ((1 - relativeY) * 0.35)));
			const hue = Math.round((relativeX * 260 + (1 - relativeY) * 150 + centerDistance * 90 + 210) % 360);
			const colors = [0, 58, 128, 205, 285].map(offset => (hue + offset) % 360);
			const glare = 0.34 + centerDistance * 0.34;
			const sheen = 0.2 + diagonal * 0.42;
			const imageHue = (hue - 180) * 0.18;
			card.style.setProperty('--holo-glare', glare.toFixed(3));
			card.style.setProperty('--holo-glare-soft', (glare * 0.18).toFixed(3));
			card.style.setProperty('--holo-sheen', sheen.toFixed(3));
			card.style.setProperty('--holo-sheen-soft', (sheen * 0.28).toFixed(3));
			card.style.setProperty('--holo-sat', (1.08 + centerDistance * 0.42).toFixed(3));
			card.style.setProperty('--holo-img-hue', `${imageHue.toFixed(1)}deg`);
			card.style.setProperty('--holo-img-sat', (1.02 + diagonal * 0.18).toFixed(3));
			card.style.setProperty('--holo-img-bright', (1 + centerDistance * 0.04).toFixed(3));
			colors.forEach((color, index) => card.style.setProperty(`--holo-h${index + 1}`, `${color}deg`));
			const name = card.querySelector('p.AchName');
			if (name) {
				const projection = (relativeX + relativeY) / 2;
				const targetShift = 0.5 + (0.5 - projection) * 0.46;
				const currentShift = Number.parseFloat(card.dataset.holoTitleShift ?? "0.5");
				const titleShift = currentShift + (targetShift - currentShift) * 0.22;
				card.dataset.holoTitleShift = titleShift.toFixed(4);
				const hueOffset = (titleShift - 0.5) * 72;
				const titleHue1 = 318 + hueOffset;
				const titleHue2 = 218 - hueOffset * 0.72;
				const titleHue3 = 155 + hueOffset * 0.48;
				name.style.setProperty('background',
					`linear-gradient(90deg, hsla(${titleHue1.toFixed(1)}, 46%, 34%, 0.92), hsla(${titleHue2.toFixed(1)}, 48%, 31%, 0.92), hsla(${titleHue3.toFixed(1)}, 42%, 30%, 0.92))`,
					'important');
			}
			card.style.setProperty('background',
				`radial-gradient(circle at ${relativeX * 100}% ${relativeY * 100}%, rgba(255,255,255,${glare.toFixed(3)}) 0%, rgba(255,255,255,0.12) 18%, transparent 48%), ` +
				`linear-gradient(${Math.round(Math.atan2(relativeY - 0.5, relativeX - 0.5) * 180 / Math.PI + 180)}deg, rgba(255,255,255,0) 0%, rgba(255,255,255,${sheen.toFixed(3)}) 46%, rgba(255,255,255,0) 58%), ` +
				`conic-gradient(from ${Math.round((hue + relativeX * 180) % 360)}deg at ${relativeX * 100}% ${relativeY * 100}%, hsla(${colors[0]},100%,66%,0.68), hsla(${colors[1]},100%,62%,0.5), hsla(${colors[2]},100%,64%,0.54), hsla(${colors[3]},100%,65%,0.66), hsla(${colors[4]},100%,68%,0.6), hsla(${colors[0]},100%,66%,0.68)), ` +
				`linear-gradient(155deg, #11131f 0%, #080a11 100%)`,
				'important');
		}
		function clearHolographicHoverVars(card) {
			['--holo-x', '--holo-y', '--holo-angle', '--holo-glare', '--holo-glare-soft', '--holo-sheen', '--holo-sheen-soft', '--holo-sat', '--holo-img-hue', '--holo-img-sat', '--holo-img-bright', '--holo-h1', '--holo-h2', '--holo-h3', '--holo-h4', '--holo-h5']
				.forEach(prop => card.style.removeProperty(prop));
			delete card.dataset.holoTitleShift;
			card.style.removeProperty('background');
			card.querySelector('p.AchName')?.style.removeProperty('background');
		}
		document.getElementById('AchievementList').addEventListener('click', function (event) {
			let iconElement = event.target.closest('.AchIcon'); // Ensure click is on AchIcon
			if (!iconElement) return;

			let achievementElement = iconElement.closest('.far-grid-item');
			if (!achievementElement) return;

			let achievementName = achievementElement.querySelector('.AchName')?.innerText.trim();
			if (!achievementName) return;

			let AchievementData = JSON.parse(game.settings.get('farchievements', 'achievementdataNEW'));
			let achievement = AchievementData.find(ach => ach.name === achievementName);

			if (achievement && achievement.known !== "unknownAch") {
				let playerId = getActivePlayer();
				window.Farchievements.DisplayAchievementPopup(achievementName, playerId);
			}
		});

		if (game.settings.get('farchievements', 'OmniView')) document.getElementById('AchSwitchInput').checked = true;
		else document.getElementById('AchSwitchInput').checked = false;

		updateSimulateBannerControls();
		
		function loadPageNav(AchievementList){
			//console.log("Loading Page NAV");
			document.getElementsByClassName("pageNav")[0].style.display = "flex";
			let currentPage = game.settings.get('farchievements', 'currentPage');
			let displayedPerPage = game.settings.get('farchievements', 'loadPerPage');
			let pages = Math.round(AchievementList.length / displayedPerPage)+1;
			if(currentPage > 1){
				let nextpage = +currentPage - 1;
				document.getElementById('lastPageLabel').style.visibility = "visible"
				document.getElementById('lastPageLabel').innerHTML = "Page " + nextpage;
			}
			else{
				document.getElementById('lastPageLabel').style.visibility = "hidden"
			}
			
			if(displayedPerPage * currentPage  < AchievementList.length){
				let nextpage2 = +currentPage + 1;
				document.getElementById('nextPageLabel').style.visibility = "visible"
				document.getElementById('nextPageLabel').innerHTML = "Page " + nextpage2 +"/"+pages;
			}
			else{
				document.getElementById('nextPageLabel').style.visibility = "hidden"
			}	
		}
		
		function loadPlayerNav(scoreboard_bool){
			if (game.user.isGM) {//LOAD NAVIGATION BUTTONS
				document.getElementById("AchPlayerNav").innerHTML = "";
				let localizedScoreBoard = game.i18n.localize('Farchievements.Html.Scoreboard');
				$(".AchPlayerNav").append('<label id="PlayerNavScoreBoard" value="Scoreboard" class="PlayerNavButton">'+localizedScoreBoard+'</label>');
				$('#PlayerNavScoreBoard').click(function () {
					game.settings.set('farchievements', 'loadSettingsForPlayer', "");
					loadScoreboard();
					return;
				});
				let i = 0;
				game.users.forEach(function (user) {
					i++;
					let active = ''
					if (user.isGM) {
						if ("" == game.settings.get('farchievements', 'loadSettingsForPlayer'))
							active = 'active';
						let localizedGMVIEW = game.i18n.localize('Farchievements.Html.GMView');
						$(".AchPlayerNav").append('<label id="PlayerNavGMVIEW" value="GMVIEW" class="PlayerNavButton ' + active + '"> '+localizedGMVIEW+'</label>');
						$('#PlayerNavGMVIEW').click(function () {
							document.querySelector('.achievementsscreen-window .window-header').style['background'] = "black";
							document.querySelector('.achievementsscreen-window .window-header').style['color'] = "white";
							game.settings.set('farchievements', 'loadSettingsForPlayer', "");
							loadAchievements();
							return;

							active = 'active';

						$(".AchPlayerNav").append('<label id="PlayerNav' + i + '" value="' + user.id + '" class="PlayerNavButton ' + active + '">' + user.name + '</label>');

						$('#PlayerNav' + i).click(function () {

					let langScoreboard = game.i18n.localize('Farchievements.Html.Scoreboard');

					$(".AchPlayerNav").append('<label id="PlayerNavScoreBoard" value="Scoreboard" class="PlayerNavButton">'+langScoreboard+'</label>');
					$(".AchPlayerNav").append('<label id="PlayerNav' + 0 + '" value="' + game.user.id + '" class="PlayerNavButton ' + active + '" onclick="loadAchievements()">'+langMyAch+'</label>');
					$('#PlayerNavScoreBoard').click(function () {
						game.settings.set('farchievements', 'loadSettingsForPlayer', "");

			}

			$('.PlayerNavButton.active')[0].classList.remove("active");
			$('#PlayerNavScoreBoard')[0].classList.add("active");
			}
		}
		
		function shadeHexColor(color, percent) {
			if (typeof color.css !== 'string' || !/^#[0-9A-F]{6}$/i.test(color.css )) {
				//console.log("Invalid hex color format");
				return color.css ; // Return original color if invalid
			}
			var f = parseInt(color.css.slice(1), 16),
				t = percent < 0 ? 0 : 255,
				p = Math.abs(percent),
				R = f >> 16,
				G = f >> 8 & 0x00FF,
				B = f & 0x0000FF;

			return "#" + (
				0x1000000 +
				(Math.round((t - R) * p) + R) * 0x10000 +
				(Math.round((t - G) * p) + G) * 0x100 +
				(Math.round((t - B) * p) + B)
			).toString(16).slice(1);
		}

		function toggleOmniView() {
			if (game.settings.get('farchievements', 'OmniView')) game.settings.set('farchievements', 'OmniView', false);
			else game.settings.set('farchievements', 'OmniView', true);
			//console.log(game.settings.get('farchievements', 'OmniView'));
			game.settings.set('farchievements', 'currentPage',1);

		}
		function toggleSimulateBanner() {
			if (!isGMViewActive()) return;
			const cb = document.getElementById('SimulateBannerInput');
			const on = !!cb.checked;
			game.settings.set('farchievements', 'SimulateBanner', on);
			updateSimulateBannerControls();
		}
		function setDefaultBannerAnimation() {
			const sel = document.getElementById('BannerStylePickerSelect');
			if (sel) game.settings.set('farchievements', 'bannerAnimation', sel.value);
		}
		function isGMViewActive() {
			if (!game.user.isGM) return false;
			const activeNav = $('.PlayerNavButton.active')[0];
			if (activeNav) return activeNav.getAttribute('value') === 'GMVIEW';
			return game.settings.get('farchievements', 'loadSettingsForPlayer') === "";
		}
		function updateSimulateBannerControls() {
			const controls = document.getElementById('hiddenforuser5');
			const picker = document.getElementById('hiddenforuser6');
			const input = document.getElementById('SimulateBannerInput');
			const select = document.getElementById('BannerStylePickerSelect');
			const inGMView = isGMViewActive();
			const simOn = inGMView && !!game.settings.get('farchievements', 'SimulateBanner');
			if (controls) controls.style.display = inGMView ? '' : 'none';
			if (input) input.checked = simOn;
			if (picker) picker.style.display = simOn ? '' : 'none';
			if (select) select.value = game.settings.get('farchievements', 'bannerAnimation') || 'slidein';
		}
		function ensureBannerElements() {
			let bar = document.getElementById('Achievementbar');
			let banner = document.getElementById('FoundryAchievements');
			if (bar && banner) return { bar, banner };
			const bannerStyle = 'top: -200px; background-position: center!important; display: flex; background-size: 100% 100% !important;';
			bar = document.createElement('div');
			bar.id = 'Achievementbar';
			bar.className = 'Achievementbar';
			bar.style.display = 'none';
			bar.innerHTML = `<div id="FoundryAchievements" class="FoundryAchievementsBanner" style="${bannerStyle}"><img id="AchievementIMG" class="AchievementIMG" src="modules/farchievements/standardIcon.PNG"></img><p class="AchievementText"><label class="AchievementTextLabel">${game.i18n.localize('Farchievements.NewAchievement')}</label> (${game.i18n.localize('Farchievements.Achievement')}) </p><i class="Shiny"></i></div>`;
			document.body.appendChild(bar);
			return { bar, banner: document.getElementById('FoundryAchievements') };
		}
		async function simulateBannerFor(achievementName) {
			try {
				const data = JSON.parse(game.settings.get('farchievements', 'achievementdataNEW'));
				const ach = data.find(a => a.name === achievementName);
				if (!ach) {
					ui.notifications.warn("Farchievements | Achievement not found: " + achievementName);
					return;
				}
				const { bar, banner } = ensureBannerElements();
				if (!bar || !banner) {
					ui.notifications.warn("Farchievements | Banner element missing — open a session with a player or wait for ready.");
					return;
				}
				const anim = ach.bannerAnimation || game.settings.get('farchievements', 'bannerAnimation');
				const meta = (window.Farchievements && window.Farchievements.getBannerAnimMeta)
					? window.Farchievements.getBannerAnimMeta(anim)
					: { dur: 13, preDelay: anim === 'slidein' ? 1800 : 0, sound: anim === 'fadeOut' ? 'sound' : 'stinger' };
				const dur  = meta.dur;
				const icon = ach.image || game.settings.get('farchievements', 'standarticon');
				const preText = game.settings.get('farchievements', 'achpretext') || '';

				document.getElementsByClassName('AchievementText')[0].innerHTML =
					`<label class="AchievementTextLabel">${preText}</label>` + ach.name;
				document.getElementById('AchievementIMG').src = icon;
				banner.classList.toggle('glowingAch', !!ach.glowing);

				// Swap per-animation style variant on the banner
				banner.classList.forEach(c => { if (c.startsWith('banner-style-')) banner.classList.remove(c); });
				banner.classList.forEach(c => { if (c.startsWith('banner-card-')) banner.classList.remove(c); });
				banner.classList.add('banner-style-' + anim);

				bar.style.setProperty('animation-name', anim);
				bar.style.setProperty('animation-duration', `${dur}s`);

				// Optional audio (skip silently on failure / older Foundry shims)
				try {
					const _audio = foundry?.audio?.AudioHelper ?? globalThis.AudioHelper;
					const soundKey  = (meta.sound === 'sound') ? 'achievementSound' : 'achievementStinger';
					const volumeKey = (meta.sound === 'sound') ? 'achievementSoundVolume' : 'achievementStingerVolume';
					if (_audio?.play) {
						_audio.play({
							src: game.settings.get('farchievements', soundKey),
							volume: game.settings.get('farchievements', volumeKey),
							autoplay: true, loop: false
						}, false);
					}
				} catch (e) { console.warn("Farchievements | Simulate banner audio skipped:", e); }

				if (meta.preDelay) await new Promise(r => setTimeout(r, meta.preDelay));
				bar.style.setProperty('display', 'flex');
				await new Promise(r => setTimeout(r, dur * 1000));
				bar.style.setProperty('display', 'none');
			} catch (err) {
				console.error("Farchievements | simulateBannerFor failed:", err);
				ui.notifications.error("Farchievements | Simulate banner failed: " + err.message);
			}
		}
		function getActivePlayer() {
			let activeButton = $('.PlayerNavButton.active');
			if (activeButton.length === 1) {
				let playerValue = activeButton[0].attributes.value.value;
				if (playerValue && playerValue !== "GMVIEW") {
					return playerValue; // Keep the active player
				}
			}
			return null;
		}
		function getActivePlayerName() {
			let activeButton = $('.PlayerNavButton.active');
			if (activeButton.length === 1) {
				let playerValue = activeButton[0].attributes.value.value;
				if (playerValue && playerValue !== "GMVIEW") {
					return game.users.get(playerValue); // Keep the active player
				}
			}
			return null;
		}
		function updatePaginationControls(totalAchievements, loadPerPage, currentPage) {
			let totalPages = Math.ceil(totalAchievements / loadPerPage);
			document.getElementById("lastPageLabel").style.visibility = currentPage > 1 ? "visible" : "hidden";
			document.getElementById("nextPageLabel").style.visibility = currentPage < totalPages ? "visible" : "hidden";

			document.getElementById("lastPageLabel").innerText = `Page ${currentPage - 1}`;
			document.getElementById("nextPageLabel").innerText = `Page ${currentPage + 1} / ${totalPages}`;
		}

		function reloadAchievements(){
			if (document.getElementById('AchPlayerNav').className == "AchPlayerNav") //CHECK FOR EDITING WITHIN NORMAL WINDOW
				loadAchievements();
			else
				loadAchievementsEditMode();
		}
		function getColorChange(color) {
			var c = color;
			var rgb = parseInt(c, 16);   // convert rrggbb to decimal
			var r = (rgb >> 16) & 0xff;  // extract red
			var g = (rgb >> 8) & 0xff;  // extract green
			var b = (rgb >> 0) & 0xff;  // extract blue
			if (r <= 150) r = 150;
			if (g <= 150) g = 150;
			if (b <= 150) b = 150;
			//console.log(""+r+b+g);
			var luma = 0.2126 * r + 0.7152 * g + 0.0722 * b; // per ITU-R BT.709
			let newHexColor = c;
			//console.log(luma);
			let newVal = -1 + (50 / luma);
			newHexColor = shadeHexColor(color, newVal);
			document.querySelector('.achievementsscreen-window .window-header').style['background'] = newHexColor;
			//console.log(game.users.find(user => user.id == playerIDToLoadFrom).color + " -> " + newHexColor + " | Luma/Newval: "+luma+"/"+newVal);
			//DARKER
			newVal = -1 + (30 / luma);
			newHexColor = shadeHexColor(color, newVal);
			return newHexColor;
		}
		async function loadSearchAndSortAchievements() {
			let AchievementData;
			try {
				AchievementData = JSON.parse(await game.settings.get('farchievements', 'achievementdataNEW'));
				if (!Array.isArray(AchievementData)) throw new Error("Achievement data is not an array");
			} catch (e) {
				console.error("Farchievements | Failed to load achievements data:", e);
				return [];
			}

			let searchValue = game.settings.get('farchievements', 'lastSearchTerm')?.toLowerCase().trim() || "";
			let sortType = game.settings.get('farchievements', 'lastSortType') || "nameAsc";

			// Apply sorting first
			AchievementData.sort((a, b) => {
				let nameA = a.name.toLowerCase();
				let nameB = b.name.toLowerCase();
				let colorA = a.color || "";
				let colorB = b.color || "";
				let pointsA = parseInt(a.points || 0, 10);
				let pointsB = parseInt(b.points || 0, 10);
				let timeA = a.playerDates?.[game.user.id] || 0;
				let timeB = b.playerDates?.[game.user.id] || 0;

				switch (sortType) {
					case "nameAsc": return nameA.localeCompare(nameB);
					case "nameDesc": return nameB.localeCompare(nameA);
					case "gainedAsc": return timeA - timeB;
					case "gainedDesc": return timeB - timeA;
					case "colorAsc": return colorA.localeCompare(colorB);
					case "colorDesc": return colorB.localeCompare(colorA);
					case "pointsAsc": return pointsA - pointsB;
					case "pointsDesc": return pointsB - pointsA;
					case "default":
					default: return 0; // No sorting applied
				}
			});

			// Apply search filtering
			if (searchValue.length > 0) {
				let searchTerms = searchValue.toLowerCase().split(/\s+/);
				
				let scoreFilter = null;
				let glowFilter = null;
				let terms = [];

				searchTerms.forEach(term => {
					if (term.startsWith("score:")) {
						let scoreVal = parseInt(term.split(":")[1]);
						if (!isNaN(scoreVal)) scoreFilter = scoreVal;
					} else if (term.startsWith("glow:")) {
						glowFilter = term.split(":")[1] === "true";
					} else {
						terms.push(term);
					}
				});

				AchievementData = AchievementData
					.map(achievement => {
						let lowerName = achievement.name.toLowerCase();
						let lowerDesc = achievement.description.toLowerCase();
						let points = parseInt(achievement.points || 0);
						let glowing = Boolean(achievement.glowing);

						// Score Filtering (if applied)
						if (scoreFilter !== null && points !== scoreFilter) return null;

						// Glow Filtering (if applied)
						if (glowFilter !== null && glowing !== glowFilter) return null;

						let nameMatchScore = terms.reduce((score, term) => score + (lowerName.includes(term) ? 2 : 0), 0);
						let descMatchScore = terms.reduce((score, term) => score + (lowerDesc.includes(term) ? 1 : 0), 0);
						let totalScore = nameMatchScore + descMatchScore;

						return totalScore > 0 ? { achievement, totalScore } : null;
					})
					.filter(item => item !== null)
					.sort((a, b) => b.totalScore - a.totalScore)
					.map(item => item.achievement);
			}

			return AchievementData;
		}

					// Original holo-card tilt: strong tilt, big brightness/contrast sweep, scale 1.2,
					// plus a very subtle angle-driven shine overlay.
					card.addEventListener('mousemove', (e) => {
						const rect = card.getBoundingClientRect();
						const cx = rect.left + rect.width / 2;
						const cy = rect.top + rect.height / 2;
						const xAxis = (e.clientX - cx) / 5;
						const yAxis = (e.clientY - cy) / 5;
						const relativeX = (e.clientX - rect.left) / rect.width;
						const relativeY = (e.clientY - rect.top) / rect.height;
						const holoX = Math.max(0, Math.min(100, relativeX * 100));
						const holoY = Math.max(0, Math.min(100, relativeY * 100));
						const holoAngle = Math.round(Math.atan2(relativeY - 0.5, relativeX - 0.5) * 180 / Math.PI + 180);
						card.style.setProperty('--holo-x', `${holoX}%`);
						card.style.setProperty('--holo-y', `${holoY}%`);
						card.style.setProperty('--holo-angle', `${holoAngle}deg`);
						setHolographicHoverVars(card, relativeX, relativeY);

						const minBrightness = 0.8, maxBrightness = 1.5;
						const minContrast = 1, maxContrast = 1.2;
						const brightness = minBrightness + (maxBrightness - minBrightness) * relativeY;
						const contrast = minContrast + (maxContrast - minContrast) * relativeY;

						card.style.transition = 'transform 0s';
						card.style.transform = `perspective(800px) rotateY(${xAxis}deg) rotateX(${yAxis}deg) scale(1.2)`;
						card.style.zIndex = '10000';
						card.style.filter = card.classList.contains('achievement-card-holographic')
							? `brightness(${brightness}) contrast(${contrast}) saturate(var(--holo-sat))`
							: `brightness(${brightness}) contrast(${contrast})`;

						const shine = isTypedCard ? null : card.querySelector('.cardShine');
						if (shine) {
							// Fixed top-left light source. Intensity is encoded directly in the
							// gradient's RGBA stops so the change is instant — opacity stays at 1.
							const distFromTopLeft = Math.hypot(relativeX, relativeY); // 0 at top-left → ~1.41 at bottom-right
							const k = Math.max(0, 1 - distFromTopLeft / 1.2);          // 1 near top-left → 0 far away
							const peak = (0.10 + k * 0.45).toFixed(3);
							const mid  = (0.04 + k * 0.14).toFixed(3);
							shine.style.opacity = '1';
							shine.style.background =
								`linear-gradient(135deg,` +
								` rgba(255,255,255,${peak}) 0%,` +
								` rgba(255,255,255,${mid}) 30%,` +
								` rgba(255,255,255,0) 65%)`;
						}

						const glass = card.querySelector('.cardGlassShine');

							// Glassy band oriented top-right → bottom-left. Reflection physics:
							// it moves OPPOSITE the cursor's diagonal projection and travels in
							// a smaller range than the cursor, so it feels weighty and natural.
							const projection = (relativeX + relativeY) / 2;     // 0 (top-left) → 1 (bottom-right)
							const pos = 50 + (0.5 - projection) * 40;           // inverted, ±20% from center
							glass.style.opacity = '1';
							glass.style.background =
								`linear-gradient(135deg,` +
								` rgba(255,255,255,0) ${Math.max(pos - 22, 0)}%,` +

								` rgba(255,255,255,0.40) ${pos}%,` +
								` rgba(255,255,255,0.05) ${Math.min(pos + 8, 100)}%,` +

						if (shine) shine.style.opacity = '0';
						const glass = card.querySelector('.cardGlassShine');
						if (glass) glass.style.opacity = '0';
					});
				} else {
					// Simple flat hover — crisp text, just a clean lift
					if (card.classList.contains('achievement-card-holographic')) {
						card.addEventListener('mousemove', (e) => {
							const rect = card.getBoundingClientRect();
							const relativeX = (e.clientX - rect.left) / rect.width;
							const relativeY = (e.clientY - rect.top) / rect.height;
							const holoX = Math.max(0, Math.min(100, relativeX * 100));
							const holoY = Math.max(0, Math.min(100, relativeY * 100));
							const holoAngle = Math.round(Math.atan2(relativeY - 0.5, relativeX - 0.5) * 180 / Math.PI + 180);
							card.style.setProperty('--holo-x', `${holoX}%`);
							card.style.setProperty('--holo-y', `${holoY}%`);
							card.style.setProperty('--holo-angle', `${holoAngle}deg`);
							setHolographicHoverVars(card, relativeX, relativeY);
						});
					}
					card.addEventListener('mouseenter', () => {
						card.style.transition = 'transform 0.18s cubic-bezier(0.4, 0, 0.2, 1), filter 0.18s ease';
						card.style.transform = 'translate3d(0,-4px,0)';
						card.style.zIndex = '10';
						card.style.filter = card.classList.contains('achievement-card-holographic')
							? 'brightness(1.08) saturate(var(--holo-sat)) drop-shadow(0 10px 22px rgba(0,0,0,0.55))'
							: 'brightness(1.08) drop-shadow(0 10px 22px rgba(0,0,0,0.55))';

		async function updatePlayerProgress(achievementName, playerId, changeAmount) {
			let AchievementData = JSON.parse(await game.settings.get('farchievements', 'achievementdataNEW'));
			let achievement = AchievementData.find(ach => ach.name === achievementName);
			if (!achievement) return;
			achievement = Object.assign(new Achievement(), achievement);
			achievement.addProgress(playerId, changeAmount);
			let updatedAchievementIndex = AchievementData.findIndex(ach => ach.name === achievementName);
			AchievementData[updatedAchievementIndex] = achievement;

			await game.settings.set('farchievements', 'achievementdataNEW', JSON.stringify(AchievementData));

			loadAchievements();
		}

		function handleDragStart(e) {
		  e.stopPropagation(); // stops the browser from redirecting.
		  this.style.opacity = '0.4';
		  let Elements = document.querySelectorAll("div.DragAndDropHandler, div.achievementtools, div.achEditName, div.achEditIcon, div.achEditInpImg, div.achEditInpDesc, div.achEditPoints");
			  Elements.forEach(function(item) {
				if(item != e.target)
					item.style.setProperty("pointer-events", "none");
		  });
		  //DATA
		  let el = e.srcElement.parentElement.children[2].firstElementChild.value;
		  //console.log("Drag from: " + el);
		  e.dataTransfer.setData("Name", e.srcElement.parentElement.children[2].firstElementChild.value);
		  return false;
		}
		function handleDragEnd(e) {
		this.style.opacity = '1';
		  let Elements = document.querySelectorAll(".DragAndDropHandler, div.achievementtools, div.achEditName, div.achEditIcon, div.achEditInpImg, div.achEditInpDesc, div.achEditPoints");
			  Elements.forEach(function(item) {
				if(item != e)
					item.style.setProperty("pointer-events", "all");
		  });
		}

		async function handleDrop(e) {
		  e.stopPropagation(); // stops the browser from redirecting.
		  console.log("HandleDropEvent | " + e.dataTransfer.getData("Name") + " -> " + e.target.children[2].firstElementChild.value);
		  
		  let AchievementData = JSON.parse(game.settings.get('farchievements', 'achievementdataNEW'));

		  let x_fromName = e.dataTransfer.getData("Name");
		  var x_FromData = AchievementData.find(ach => ach.name == x_fromName);
		  let y_toName = e.target.children[2].firstElementChild.value;
		  var y_toData = AchievementData.find(ach => ach.name == y_toName);
		  let y_index = AchievementData.findIndex(ach => ach.name == y_toName);
		  let x_index = AchievementData.findIndex(ach => ach.name == x_fromName);
		  
		  AchievementData[y_index] = x_FromData;
		  AchievementData[x_index] = y_toData;
		  
		  //SWITCH ACHIEVEMENT POSITIONS
		  await game.settings.set('farchievements', 'achievementdataNEW', JSON.stringify(AchievementData));
		  loadAchievementsEditMode();
		  return false;
		}
		function handleDragOver(e) {
			e.preventDefault();
			return false;
		}
		function handleDragEnter(e) {
			this.classList.add('over');
		}

		function handleDragLeave(e) {
			this.classList.remove('over');
		}
		function enterEditMode() {
			const bar = document.getElementsByClassName('editmodebar')[0];
			const isEditing = bar.classList.contains('editmodebar-open');
			bar.style.removeProperty('display');
			if (isEditing) {
				loadAchievements();
				bar.classList.remove('editmodebar-open');
				document.getElementById('AchPlayerNav').className = "AchPlayerNav";
				document.getElementById('AchievementList').classList.remove("editmodeList");
			}
			else {
				loadAchievementsEditMode();
				document.getElementById('AchPlayerNav').className += " hidden";
				bar.classList.add('editmodebar-open');
				document.getElementById('AchievementList').classList.add("editmodeList");
				applyEditmodeColumns();
			}
		}

		function applyEditmodeColumns() {

		async function setAchievement(achievementname, playerID) {
			if (!game.user.isGM) return;

			console.log("SettingACH");

			let player = game.users.get(playerID);
			let AchievementData = JSON.parse(await game.settings.get('farchievements', 'achievementdataNEW'));

			// Find the specific achievement to modify
			let achievementIndex = AchievementData.findIndex(x => x.name === achievementname);
			if (achievementIndex === -1) return; // If achievement not found, exit

			let achievement = new Achievement(
				AchievementData[achievementIndex].name,
				AchievementData[achievementIndex].description,
				AchievementData[achievementIndex].image,
				AchievementData[achievementIndex].points,
				AchievementData[achievementIndex].glowing,
				AchievementData[achievementIndex].color,
				AchievementData[achievementIndex].players,
				AchievementData[achievementIndex].seenBy,
				AchievementData[achievementIndex].playerDates,
				AchievementData[achievementIndex].progressRequired,
				AchievementData[achievementIndex].progressType,
				AchievementData[achievementIndex].playerProgress,
				AchievementData[achievementIndex].chainLength,
				AchievementData[achievementIndex].diceType,
				AchievementData[achievementIndex].secret,
				AchievementData[achievementIndex].bannerAnimation,
				AchievementData[achievementIndex].cardStyle
			);

			// Add or remove the player from this specific achievement
			if (achievement && Array.isArray(achievement.players)) {
				if (achievement.players.includes(playerID)) {
					achievement.removePlayer(playerID);
				} else {
					achievement.addPlayer(playerID);
				}
			} else {
				achievement.addPlayer(playerID);
				console.warn(`Achievement or players property is not properly defined for achievement: ${achievement ? achievement.name : 'undefined'}`);
			}

			// Update the achievement back into the AchievementData array
			AchievementData[achievementIndex] = achievement;

			// Save only the modified data back to game settings
			await game.settings.set('farchievements', 'achievementdataNEW', JSON.stringify(AchievementData));

			if (document.getElementById('AchPlayerNav').className == "AchPlayerNav") {
				await game.settings.set('farchievements', 'loadSettingsForPlayer', playerID);

				loadAchievements();
			} else {
				loadAchievementsEditMode();
			}
		}

		async function updateAchievement(updateType, achievementname) {
			let AchievementData = JSON.parse(await game.settings.get('farchievements', 'achievementdataNEW'));
			let reload = false;

			// Helper function to remove ' and " from strings
			function sanitizeInput(input) {
				return input.replace(/['"]/g, '');
			}

			if (updateType === 1) { // NAME
				let newName = sanitizeInput(document.getElementById('achievementname' + achievementname).value);
				if (AchievementData.find(ach => ach.name == newName)) {
					ui.notifications.warn("Farchievements | There is already an existing Achievement with the same name, added a number.");
					var number = AchievementData.filter(ach => ach.name.includes(newName.split("(")[0])).length;
					newName += "(" + number + ")";
				}
				AchievementData.filter(x => x.name == achievementname)[0].name = newName;
				reload = true;
			}

			if (updateType === 2) { // ICON
				AchievementData.filter(x => x.name == achievementname)[0].image = document.getElementById('achievementimg' + achievementname).value;
				document.getElementById("EditIcon" + achievementname).src = document.getElementById('achievementimg' + achievementname).value;
			}

			if (updateType === 3) { // DESCRIPTION
				let newDescription = sanitizeInput(document.getElementById('achievementdes' + achievementname).value);
				AchievementData.filter(x => x.name == achievementname)[0].description = newDescription;
			}

			if (updateType === 4) { // POINTS
				AchievementData.filter(x => x.name == achievementname)[0].points = document.getElementById('achievementPoints' + achievementname).value;
			}

			if (updateType === 5) { // GLOWING CHECKBOX
				AchievementData.filter(x => x.name == achievementname)[0].glowing = document.getElementById('glowCheck' + achievementname).checked;
			}

			if (updateType === 6) { // COLOR
				AchievementData.filter(x => x.name == achievementname)[0].color = document.getElementById('farchievementsColorPicker' + achievementname).value;
			}

			if (updateType === 7) { // PROGRESS REQUIRED
				AchievementData.filter(x => x.name == achievementname)[0].progressRequired = document.getElementById('achievementProgressRequired' + achievementname).value;
			}

			if (updateType === 8) { // PROGRESS TYPE
				AchievementData.filter(x => x.name == achievementname)[0].progressType = document.getElementById('achievementProgressType' + achievementname).value;
				reload = true;
			}

			if (updateType === 9) { // DICE TYPE
				AchievementData.filter(x => x.name == achievementname)[0].diceType = document.getElementById('achievementDiceType' + achievementname).value;
			}

			if (updateType === 10) { // CHAIN LENGTH
				AchievementData.filter(x => x.name == achievementname)[0].chainLength = document.getElementById('achievementChainLength' + achievementname).value;
			}
			if (updateType === 11) { // SECRET TOGGLE
				AchievementData.filter(x => x.name == achievementname)[0].secret = document.getElementById('achievementSecret' + achievementname).checked;
			}
			if (updateType === 12) { // BANNER ANIMATION OVERRIDE
				const value = document.getElementById('achievementBanner' + achievementname).value;
				AchievementData.filter(x => x.name == achievementname)[0].bannerAnimation = value || undefined;
			}
			if (updateType === 13) { // CARD STYLE
				const value = document.getElementById('achievementCardStyle' + achievementname).value;
				const achievement = AchievementData.filter(x => x.name == achievementname)[0];
				achievement.cardStyle = value || undefined;
				const card = document.getElementById('achievementCardStyle' + achievementname)?.closest('.far-grid-item');
				if (card) {
					card.classList.remove(...Array.from(card.classList).filter(c => c.startsWith('achievement-card-')));
					const className = getAchievementCardStyleClass(achievement);
					if (className) card.classList.add(className);
				}
			}
			await game.settings.set('farchievements', 'achievementdataNEW', JSON.stringify(AchievementData));

			if (reload) {
				loadAchievementsEditMode(); // RELOAD ACHIEVEMENTS TO DISPLAY CHANGES
			}
		}


		async function ChangeLoadPerPage(){
			await game.settings.set('farchievements', 'loadPerPage',document.getElementById('toLoadNumber').value);
			await game.settings.set('farchievements', 'currentPage', 1);
			reloadAchievements();
			if($('.PlayerNavButton.active').length == 1){
				if($('.PlayerNavButton.active')[0].attributes.value.value != null && $('.PlayerNavButton.active')[0].attributes.value.value != "GMVIEW")
					game.settings.set('farchievements', 'loadSettingsForPlayer', $('.PlayerNavButton.active')[0].attributes.value.value);	
			}
		loadPageNav(JSON.parse(game.settings.get('farchievements','achievementdataNEW')));
		}
		async function onClickPrevPage(){
			let newval = game.settings.get('farchievements', 'currentPage') -1;
			await game.settings.set('farchievements', 'currentPage',newval);
			reloadAchievements();
			if($('.PlayerNavButton.active').length == 1){
				if($('.PlayerNavButton.active')[0].attributes.value.value != null && $('.PlayerNavButton.active')[0].attributes.value.value != "GMVIEW")
					game.settings.set('farchievements', 'loadSettingsForPlayer', $('.PlayerNavButton.active')[0].attributes.value.value);	
			}
		loadPageNav(JSON.parse(game.settings.get('farchievements','achievementdataNEW')));
		}
		async function onClickNextPage(){
			let newval = game.settings.get('farchievements', 'currentPage') +1;
			await game.settings.set('farchievements', 'currentPage', newval);
			reloadAchievements();
			if($('.PlayerNavButton.active').length == 1){
				if($('.PlayerNavButton.active')[0].attributes.value.value != null && $('.PlayerNavButton.active')[0].attributes.value.value != "GMVIEW")
					game.settings.set('farchievements', 'loadSettingsForPlayer', $('.PlayerNavButton.active')[0].attributes.value.value);	
			}
			loadPageNav(JSON.parse(game.settings.get('farchievements','achievementdataNEW')));
		}
	</script>
</head>
<div class="playerbackground" id="playerbackground"></div>
<form class="{{cssClass}} flexcol" autocomplete="off">
	<div id="CustomAchievmentStyling"></div>
	<div id="CustomAchievmentBackgroundStyling"></div>
	<div id="AchPlayerNav" class="AchPlayerNav"></div>
	<div id="AchievementList" onSync="loadAchievements()" class="far-grid-container" style="grid-template-rows: repeat(7, 1fr);"></div>
	<div class="pageNav"><label id="lastPageLabel" onclick="onClickPrevPage()">Page 1</label>{{localize 'Farchievements.Html.LoadPerPage'}}:<input type="number" id="toLoadNumber" value="" onchange="ChangeLoadPerPage()"></input><label id="nextPageLabel" onclick="onClickNextPage()">Page 2</label></div>
	<div style="display:none;" class="editmodebar">
		<label class="editmodeColumnsControl" title="Achievements per row in editor">
			<span class="columnsLabel">Columns</span>
			<input type="range" id="editmodeColumnsRange" min="2" max="8" step="1" value="3" oninput="updateEditmodeColumns()">
			<span class="columnsValue" id="editmodeColumnsValue">3</span>
		</label>
		<i class="fas fa-plus-square achievementsettings" onclick="addAchievement()" title="Add achievement"></i>
		<i id="SyncAch" onclick="SendSyncMessage()" class="fas fa-sync achievementsettings" title="{{localize 'Farchievements.Html.PushChangesNow'}}"></i>
	</div>
	<!-- <i class="fas fa-minus-square achievementsettings" onclick="removeAchievement()"></i> -->
	<div id="achsyncnormalmode"></div>
</form>
<div class="window-resizable-handle"><i class="fas fa-arrows-alt-h"></i></div>
</html>
